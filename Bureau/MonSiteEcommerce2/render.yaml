services:
  - type: web
    name: afromarket-api
    env: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py wsgi:app
    healthCheckPath: /api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afromarket-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: CORS_ORIGINS
        value: "https://afromarket.vercel.app"  # ← remplacer par l'URL Vercel réelle
      - key: CLOUDINARY_URL
        sync: false   # à renseigner manuellement dans le dashboard Render
      - key: SITE_URL
        value: "https://afromarket.vercel.app"  # ← remplacer par l'URL Vercel réelle

databases:
  - name: afromarket-db
    databaseName: afromarket
    user: afromarket
    plan: free
